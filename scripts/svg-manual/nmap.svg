<svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <title>Nmap</title>
  <!-- Original NeonSigils rendering of a "network map": nodes linked by edges.
       Not the official Nmap logo; used as an ASCII-friendly placeholder sigil. -->
  <g fill="#000" stroke="#000" stroke-width="1.4" stroke-linecap="round">
    <line x1="12" y1="12" x2="4" y2="5" />
    <line x1="12" y1="12" x2="20" y2="6" />
    <line x1="12" y1="12" x2="5" y2="19" />
    <line x1="12" y1="12" x2="19" y2="18" />
    <line x1="4" y1="5" x2="20" y2="6" />
    <line x1="5" y1="19" x2="19" y2="18" />
  </g>
  <g fill="#000">
    <circle cx="12" cy="12" r="3.2" />
    <circle cx="4" cy="5" r="2.2" />
    <circle cx="20" cy="6" r="2.2" />
    <circle cx="5" cy="19" r="2.2" />
    <circle cx="19" cy="18" r="2.2" />
  </g>
</svg>
